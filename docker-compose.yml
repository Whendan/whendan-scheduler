services:
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3002}:3002"
    env_file:
      - .env
    environment:
      PORT: ${PORT:-3002}
      DB_URL: ${DB_URL}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      ORS_BASE_URL: ${ORS_BASE_URL:-https://api.openrouteservice.org}
      ORS_API_KEY: ${ORS_API_KEY}
    restart: unless-stopped
